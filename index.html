<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>山手線 冒険の旅しおり</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  :root {
    --parchment: #f5e6c8; --parchment2: #ede0b0; --ink: #2a1a00;
    --red: #b22222; --gold: #c8920a; --gold2: #e8b400;
    --green: #2d5a1b; --brown: #6b3a1f; --stamp-green: #2e7d32;
    --map-blue: #1a4a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1008; font-family: 'Noto Sans JP', sans-serif; color: var(--ink); padding-bottom: 64px; }

  /* ── STICKY PROGRESS HEADER ── */
  #sticky-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(20,12,4,.97); border-bottom: 1.5px solid var(--gold);
    padding: 8px 12px;
  }
  .prog-wrap { background: rgba(139,90,43,.15); border: 1px solid var(--gold); border-radius: 20px; height: 18px; overflow: hidden; }
  #prog-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold2)); border-radius: 20px; transition: width .6s ease; width: 0%; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; }
  #prog-bar span { font-size: 9px; color: white; font-weight: 700; }
  .prog-info { display:flex; justify-content:space-between; font-size: 10px; color: rgba(200,146,10,.8); margin-top: 4px; }

  /* ── TAB CONTENT ── */
  .tab-content { display: none; padding: 12px; }
  .tab-content.active { display: block; }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(20,12,4,.97); border-top: 1.5px solid var(--gold);
    display: flex; justify-content: space-around; align-items: stretch;
    z-index: 200;
  }
  #bottom-nav button {
    background: transparent; border: none; border-top: 2px solid transparent;
    color: rgba(200,146,10,.45); font-family: 'Noto Sans JP', sans-serif;
    font-size: 8px; padding: 7px 2px 6px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    flex: 1; transition: all .2s;
  }
  #bottom-nav button.active { color: var(--gold2); border-top-color: var(--gold2); }
  #bottom-nav .nav-i { font-size: 20px; line-height: 1; }

  /* ── CARD ── */
  .card { background: var(--parchment); border: 3px solid var(--gold); border-radius: 4px; padding: 14px; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
  .sec-title { font-size: 12px; font-weight: 700; color: var(--red); letter-spacing: 3px; text-align: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--gold); }

  /* ── HOME: COVER ── */
  #cover {
    background: var(--parchment);
    background-image: repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(139,90,43,.08) 28px,rgba(139,90,43,.08) 29px);
    border: 6px double var(--gold); border-radius: 4px; padding: 24px 16px;
    margin-bottom: 14px; text-align: center; position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,.8), inset 0 0 60px rgba(139,90,43,.15);
  }
  .corner { position: absolute; font-size: 22px; color: var(--gold); opacity: .6; }
  .corner.tl{top:10px;left:10px} .corner.tr{top:10px;right:10px}
  .corner.bl{bottom:10px;left:10px} .corner.br{bottom:10px;right:10px}
  .cover-label { font-size: 11px; letter-spacing: 5px; color: var(--brown); margin-bottom: 4px; }
  .cover-main { font-size: clamp(26px,6vw,40px); font-weight: 900; color: var(--red); text-shadow: 2px 2px 0 var(--gold); line-height: 1.2; }
  .cover-sub { font-size: 11px; color: var(--brown); letter-spacing: 3px; margin: 6px 0 14px; }
  .divider { display:flex; align-items:center; gap:8px; margin: 8px 0; }
  .divider::before,.divider::after { content:''; flex:1; border-top: 1.5px solid var(--gold); }
  .divider span { color: var(--gold); font-size: 16px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; }
  .stat { background: rgba(139,90,43,.1); border: 1px solid var(--gold); border-radius: 3px; padding: 8px 4px; text-align: center; }
  .stat-n { font-size: 24px; font-weight: 900; color: var(--red); line-height: 1; }
  .stat-u { font-size: 10px; color: var(--brown); }
  .stat-l { font-size: 9px; color: var(--brown); margin-top: 2px; }
  .cover-quote { font-size: 11px; color: var(--brown); letter-spacing: 2px; font-style: italic; opacity: .8; }

  /* ── HOME: COMPACT OVERRIDES ── */
  #tab-home { padding: 8px 12px; }
  #tab-home #cover { padding: 12px 12px; margin-bottom: 8px; }
  #tab-home .cover-main { font-size: clamp(22px,5vw,30px); }
  #tab-home .cover-sub { margin: 3px 0 6px; }
  #tab-home .divider { margin: 4px 0; }
  #tab-home .stats { margin: 6px 0; }
  #tab-home .stat { padding: 5px 4px; }
  #tab-home .stat-n { font-size: 20px; }
  #tab-home .card { padding: 10px; margin-bottom: 8px; }
  #tab-home .ms-grid { grid-template-columns: repeat(auto-fill, minmax(85px,1fr)); gap: 4px; }
  #tab-home .ms { padding: 4px; }
  #tab-home .ms-icon { font-size: 16px; margin-bottom: 1px; }
  #tab-home .ms-km { font-size: 13px; }
  #tab-home .ms-label { font-size: 7px; }
  #tab-home footer { padding: 4px 0 6px; }

  /* ── HOME: MILESTONES ── */
  .ms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px,1fr)); gap: 6px; }
  .ms { border: 1.5px solid; border-radius: 4px; padding: 6px; text-align: center; transition: all .3s; }
  .ms.locked { border-color: rgba(139,90,43,.3); background: rgba(139,90,43,.05); opacity: .6; }
  .ms.unlocked { border-color: var(--gold); background: linear-gradient(135deg,rgba(200,146,10,.1),rgba(200,146,10,.2)); box-shadow: 0 0 10px rgba(200,146,10,.4); }
  .ms-icon { font-size: 20px; margin-bottom: 2px; }
  .ms-km { font-size: 15px; font-weight: 900; color: var(--red); }
  .ms.unlocked .ms-km { color: var(--gold); }
  .ms-label { font-size: 8px; color: var(--brown); line-height: 1.3; margin-top: 2px; }

  /* ── STATION TAB BACKGROUND ── */
  #tab-stations { background: var(--parchment); }
  #tab-stations .filter-bar { background: rgba(139,90,43,.12); }

  /* ── STATIONS: FILTER BAR ── */
  .filter-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px; padding: 8px 10px;
    background: rgba(139,90,43,.1); border: 1px solid rgba(200,146,10,.3); border-radius: 6px;
  }
  .filter-bar span { font-size: 11px; color: var(--brown); font-weight: 700; }
  .toggle-btn {
    background: rgba(139,90,43,.2); border: 1px solid var(--gold); border-radius: 12px;
    padding: 4px 12px; font-size: 10px; font-weight: 700; color: var(--brown);
    cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all .2s;
  }
  .toggle-btn.on { background: var(--red); color: white; border-color: var(--red); }

  /* ── STATIONS: HALF LABEL ── */
  .half { background: var(--map-blue); color: white; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-align: center; padding: 4px; border-radius: 2px; margin-bottom: 8px; }
  .half.south { background: var(--green); }

  /* ── STATION CARD ── */
  .st-card {
    display:block; position:relative; padding: 8px 58px 8px 8px; margin-bottom: 7px;
    border: 1px solid rgba(139,90,43,.3); border-radius: 4px; background: rgba(255,255,255,.75);
    transition: all .35s;
  }
  .st-card.visited { background: rgba(245,224,160,.7); border-color: var(--gold); }
  .st-card.collapsed {
    padding: 5px 40px 5px 8px; margin-bottom: 4px; opacity: .55;
    background: rgba(200,230,200,.45); border-color: rgba(46,125,50,.35);
  }
  .st-card.collapsed .st-detail { display: none; }
  .st-card.hidden { display: none; }

  .stamp-btn {
    position:absolute; top:8px; right:8px;
    width:46px; height:46px; border-radius:50%; border:3px solid;
    background:transparent; cursor:pointer; font-size:10px; font-weight:700;
    font-family:'Noto Sans JP',sans-serif; transition:all .25s;
    display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.2;
  }
  .st-card.collapsed .stamp-btn { width:26px; height:26px; font-size:14px; border-width:2px; top:5px; right:6px; }
  .stamp-btn.u { border-color: rgba(139,90,43,.3); color: rgba(139,90,43,.4); }
  .stamp-btn.s { border-color: var(--stamp-green); color: var(--stamp-green); background: rgba(46,125,50,.1); transform:rotate(-5deg); box-shadow:0 0 8px rgba(46,125,50,.3); font-size:18px; }
  .stamp-btn.s::after { content:''; position:absolute; inset:-2px; border:1px dashed var(--stamp-green); border-radius:50%; opacity:.5; }
  .stamp-btn:hover { transform: scale(1.05) rotate(-3deg); }
  .stamp-btn.s:hover { transform: scale(1.08) rotate(-5deg); }
  @keyframes stampIn { 0%{transform:scale(2) rotate(-15deg);opacity:0} 60%{transform:scale(.9) rotate(-3deg)} 100%{transform:scale(1) rotate(-5deg);opacity:1} }
  .stamp-btn.s { animation: stampIn .35s ease forwards; }

  .st-info { }
  .st-head { display:flex; align-items:baseline; gap:6px; flex-wrap:wrap; margin-bottom:2px; }
  .st-num { font-size:9px; font-weight:700; color:var(--map-blue); background:rgba(26,74,122,.1); border:1px solid var(--map-blue); border-radius:2px; padding:1px 3px; flex-shrink:0; }
  .st-name { font-size:14px; font-weight:900; color:var(--ink); }
  .st-km { font-size:10px; color:var(--brown); white-space:nowrap; margin-left:6px; }
  .st-time { font-size:10px; color:var(--map-blue); font-weight:700; display:inline; }
  .trivia { font-size:9.5px; color:var(--brown); background:rgba(139,90,43,.07); border-left:2px solid var(--gold); padding:3px 5px; margin-top:3px; border-radius:0 2px 2px 0; line-height:1.5; }
  .trivia-lbl { font-size:8px; font-weight:700; color:var(--gold); display:block; margin-bottom:1px; }
  .st-memo { font-size:9px; color:var(--green); font-weight:700; margin-top:2px; }
  .badge { display:inline-block; font-size:8px; font-weight:700; padding:1px 4px; border-radius:2px; margin-left:3px; vertical-align:middle; }
  .badge.start,.badge.goal { background:var(--red); color:white; }
  .badge.rest { background:var(--gold); color:white; }
  .badge.milestone { background:var(--map-blue); color:white; }
  .hr-dashed { border:none; border-top:1px dashed rgba(139,90,43,.3); margin:10px 0; }

  /* ── GOURMET ── */
  .lunch-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  @media(max-width:400px){.lunch-grid{grid-template-columns:1fr}}
  .l-card { border:1px solid rgba(45,90,27,.3); border-radius:4px; padding:8px; background:rgba(255,255,255,.5); }
  .l-card.local { border-color:var(--gold); background:rgba(200,146,10,.07); }
  .l-name { font-size:12px; font-weight:700; color:var(--ink); }
  .l-genre { font-size:9px; color:white; background:var(--green); border-radius:2px; padding:1px 4px; display:inline-block; margin:2px 0; }
  .l-local-badge { font-size:9px; color:var(--gold); background:rgba(200,146,10,.15); border:1px solid var(--gold); border-radius:2px; padding:1px 4px; display:inline-block; margin:2px 0 2px 3px; font-weight:700; }
  .l-rec { font-size:10px; color:var(--brown); font-weight:700; margin-bottom:2px; }
  .l-desc { font-size:9px; color:var(--brown); line-height:1.5; }

  /* ── MAP TAB ── */
  #tab-map { background: var(--parchment); }
  .map-dest-card { background: var(--parchment); border: 2px solid var(--gold); border-radius: 8px; padding: 16px; margin-bottom: 14px; text-align: center; box-shadow: 0 4px 16px rgba(0,0,0,.4); }
  .map-dest-label { font-size: 10px; color: var(--brown); letter-spacing: 3px; margin-bottom: 6px; }
  .map-dest-name { font-size: 30px; font-weight: 900; color: var(--red); text-shadow: 1px 1px 0 var(--gold); margin-bottom: 4px; }
  .map-dest-meta { font-size: 10px; color: var(--brown); margin-bottom: 14px; }
  .map-main-btn { display: block; background: var(--map-blue); color: white; padding: 13px; border-radius: 6px; text-decoration: none; font-weight: 900; font-size: 14px; letter-spacing: 1px; box-shadow: 0 3px 10px rgba(26,74,122,.5); }
  .map-main-btn:active { opacity: .8; }
  .map-section-title { font-size: 10px; font-weight: 700; color: rgba(200,146,10,.8); letter-spacing: 3px; margin: 14px 0 8px; padding-bottom: 4px; border-bottom: 1px solid rgba(200,146,10,.25); }
  .map-station-row { display: flex; align-items: center; gap: 8px; padding: 9px 10px; margin-bottom: 5px; background: rgba(255,255,255,.72); border: 1px solid rgba(139,90,43,.2); border-radius: 5px; }
  .map-st-num { font-size: 9px; color: var(--map-blue); border: 1px solid var(--map-blue); border-radius: 2px; padding: 1px 4px; flex-shrink: 0; }
  .map-st-name { font-size: 13px; font-weight: 900; flex: 1; color: var(--ink); }
  .map-st-km { font-size: 10px; color: var(--brown); flex-shrink: 0; }
  .map-mini-btn { background: var(--map-blue); color: white; text-decoration: none; padding: 5px 10px; border-radius: 4px; font-size: 13px; flex-shrink: 0; }
  .map-complete { background: var(--parchment); border: 2px solid var(--gold); border-radius: 8px; padding: 30px; text-align: center; font-size: 18px; font-weight: 900; color: var(--red); }

  /* ── MAP LINK BUTTON ── */
  .map-btn { display:block; margin-top:6px; text-align:center; font-size:9px; font-weight:700; color:var(--map-blue); background:rgba(26,74,122,.08); border:1px solid rgba(26,74,122,.3); border-radius:4px; padding:4px; text-decoration:none; }
  .map-btn:active { background:rgba(26,74,122,.18); }

  /* ── ITEMS (持ち物) ── */
  .items-section { margin-bottom: 14px; }
  .items-label { display:inline-block; font-size:10px; font-weight:900; letter-spacing:2px; padding:3px 10px; border-radius:3px; margin-bottom:8px; }
  .items-label.must { background:var(--red); color:white; }
  .items-label.nice { background:var(--map-blue); color:white; }
  .items-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:5px; padding:10px 4px 8px; border-radius:6px; text-align:center; }
  .item.must { background:rgba(178,34,34,.07); border:1.5px solid rgba(178,34,34,.25); }
  .item.nice { background:rgba(26,74,122,.06); border:1.5px solid rgba(26,74,122,.2); }
  .item-icon { font-size:26px; line-height:1; }
  .item-name { font-size:9px; font-weight:700; color:var(--ink); line-height:1.4; }

  /* ── MILESTONE TOASTS ── */
  #ms-toast-container { position:fixed; top:calc(50% + 38px); left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; z-index:999; pointer-events:none; }
  .ms-toast { background:rgba(26,16,8,.95); color:var(--gold2); font-size:15px; font-weight:900; padding:14px 28px; border-radius:8px; border:2px solid var(--gold); box-shadow:0 8px 32px rgba(0,0,0,.7); white-space:nowrap; letter-spacing:1px; animation:msToastPop .2s ease forwards; }
  @keyframes msToastPop { from{transform:scale(.75);opacity:0} to{transform:scale(1);opacity:1} }

  /* ── TOAST ── */
  #toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(.75); opacity:0; background:rgba(26,16,8,.95); color:var(--gold2); font-size:15px; font-weight:900; padding:14px 28px; border-radius:8px; border:2px solid var(--gold); box-shadow:0 8px 32px rgba(0,0,0,.7); transition:transform .2s ease, opacity .2s ease; z-index:999; white-space:nowrap; pointer-events:none; letter-spacing:1px; }
  #toast.show { transform:translate(-50%,-50%) scale(1); opacity:1; }

  /* ── CONFETTI ── */
  #confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:998; }

  footer { text-align:center; color:rgba(245,230,200,.4); font-size:10px; padding:10px 0 16px; letter-spacing:2px; }
</style>
</head>
<body>

<!-- STICKY PROGRESS HEADER (always visible) -->
<div id="sticky-header">
  <div class="prog-wrap"><div id="prog-bar"><span id="prog-pct">0%</span></div></div>
  <div class="prog-info">
    <span>渋谷 出発</span>
    <span><span id="prog-s">0</span>/30駅 ｜ <span id="prog-km" style="color:var(--gold2);font-weight:700;">0</span>km</span>
    <span>渋谷 ゴール</span>
  </div>
</div>

<!-- ══ TAB: ホーム ══ -->
<div id="tab-home" class="tab-content active">
  <div id="cover">
    <div class="corner tl">✦</div><div class="corner tr">✦</div>
    <div class="corner bl">✦</div><div class="corner br">✦</div>
    <div class="cover-label">— 冒険の記録 —</div>
    <div class="cover-main">山手線<br>一周徒歩の旅</div>
    <div class="cover-sub">渋谷より出立・新宿方向へ</div>
    <div class="divider"><span>⬡</span></div>
    <div class="stats">
      <div class="stat"><div class="stat-n">34</div><div class="stat-u">km</div><div class="stat-l">総距離</div></div>
      <div class="stat"><div class="stat-n">30</div><div class="stat-u">駅</div><div class="stat-l">チェックポイント</div></div>
      <div class="stat"><div class="stat-n">12</div><div class="stat-u">時間</div><div class="stat-l">大冒険</div></div>
    </div>
  </div>

  <div class="card">
    <div class="sec-title">🏆 距離マイルストーン</div>
    <div class="ms-grid" id="ms-grid"></div>
  </div>

  <footer>― 山手線一周徒歩の旅しおり ― 令和の大冒険 ―<br>
  <button onclick="resetAll()" style="margin-top:10px;background:transparent;border:1px solid rgba(245,230,200,0.3);color:rgba(245,230,200,0.4);font-size:10px;padding:4px 14px;border-radius:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">スタンプをリセット</button>
  </footer>
</div>

<!-- ══ TAB: 駅スタンプ ══ -->
<div id="tab-stations" class="tab-content">
  <div class="filter-bar">
    <span>📍 チェックポイント</span>
    <button class="toggle-btn" id="filter-btn" onclick="toggleFilter()">未訪問のみ</button>
  </div>
  <div class="half">【前半】北半周　渋谷 → 田端</div>
  <div id="north"></div>
  <hr class="hr-dashed">
  <div class="half south">【後半】南半周　田端 → 渋谷</div>
  <div id="south"></div>
</div>

<!-- ══ TAB: マップ ══ -->
<div id="tab-map" class="tab-content">
  <div id="map-content"></div>
</div>

<!-- ══ TAB: グルメ ══ -->
<div id="tab-gourmet" class="tab-content">
  <div class="card" style="border-color:var(--green);">
    <div class="sec-title" style="color:var(--green);">🍜 昼食</div>
    <p style="font-size:9px;color:var(--brown);text-align:center;margin-bottom:10px;">腹八分目を守り、後半の冒険に備えよ。蕎麦・うどんが上策なり。</p>
    <div class="lunch-grid" id="lunch-grid"></div>
  </div>
</div>

<!-- ══ TAB: 持ち物 ══ -->
<div id="tab-tips" class="tab-content">
  <div class="card">
    <div class="sec-title">🎒 持ち物リスト</div>
    <div class="items-section">
      <div class="items-label must">★ 必須</div>
      <div id="items-must"></div>
    </div>
    <div class="items-section">
      <div class="items-label nice">◎ あると安心</div>
      <div id="items-nice"></div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
  <button id="nav-home" class="active" onclick="showTab('home')">
    <span class="nav-i">🏠</span>ホーム
  </button>
  <button id="nav-stations" onclick="showTab('stations')">
    <span class="nav-i">🗺</span>駅スタンプ
  </button>
  <button id="nav-map" onclick="showTab('map')">
    <span class="nav-i">🧭</span>マップ
  </button>
  <button id="nav-gourmet" onclick="showTab('gourmet')">
    <span class="nav-i">🍜</span>昼食
  </button>
  <button id="nav-tips" onclick="showTab('tips')">
    <span class="nav-i">🎒</span>持ち物
  </button>
</nav>

<canvas id="confetti-canvas"></canvas>
<div id="ms-toast-container"></div>
<div id="toast"></div>

<script>
const ST = [
  {n:"渋谷",km:0,t:"07:00",tri:"・ハチ公像のモデルは秋田犬。1925年から1934年まで毎日主人を待ち続けた忠犬<br>・スクランブル交差点は1日最大50万人が交差する世界的名所<br>・乗降客数1日約220万人で山手線3位のターミナル駅<br>・「渋谷」の地名は鎌倉時代の豪族・渋谷氏に由来する<br>・かつては渋谷川が流れ、低地特有の複雑な地形が駅の構造を決定づけた<br>・渋谷駅は地下5階から地上3階まで広がる超立体迷宮構造",m:"スタート！ハチ公口より出発",b:["start"]},
  {n:"原宿",km:2.0,t:"07:35",tri:"・明治神宮の森は1920年に人工植林、今や23haの自然林へと自然回帰した「奇跡の森」<br>・竹下通りは1977年ごろから若者文化の聖地に。全長350mに約150店が密集<br>・旧原宿駅舎（1924年築）は都内最古の木造駅舎だったが2020年に惜しまれつつ解体<br>・表参道は明治神宮への参道として1920年整備、幅36mのけやき並木が続く<br>・原宿の地名の由来は「郡中で最後に開かれた宿場」という説が有力<br>・明治神宮には年間300万人以上が初詣に訪れ、日本最多を誇る",m:"明治神宮・竹下通りそば"},
  {n:"代々木",km:3.5,t:"08:05",tri:"・代々木公園は1964年東京五輪の選手村跡地、面積54haは国会議事堂が5棟入る広さ<br>・「代々木」の地名は敷地内にあった巨大なケヤキの木が代々受け継がれたことに由来<br>・NHK放送センターが隣接、日本最大の放送局が徒歩圏内<br>・1945年まで陸軍の練兵場（代々木練兵場）として使われた歴史的な土地<br>・明治神宮の鎮守の森と隣接し、都心の貴重な緑のオアシス<br>・代々木公園は日本のヒップホップ・ブレイクダンス文化発祥の地とも言われる",m:"代々木公園沿い"},
  {n:"新宿",km:4.5,t:"08:20",tri:"・乗降客数1日約200万人でギネス認定・世界一の超巨大ターミナル<br>・改札口は約200か所、出口は約60か所という迷宮構造で迷子続出<br>・地下通路の総延長は約2kmともいわれ、もはや地下都市<br>・江戸時代は「内藤新宿」として甲州街道の第一宿場町として栄えた<br>・西新宿の高層ビル群は1970年代に整備。東京都庁は1991年竣工<br>・歌舞伎町は東洋最大規模の歓楽街のひとつとして世界的に知られる",m:"休憩15分 ★補給推奨",b:["rest"]},
  {n:"新大久保",km:5.7,t:"08:55",tri:"・1km圏内で50カ国以上の料理が食べられる東京屈指の多国籍エリア<br>・1999年ごろから韓国文化の発信地に。K-POPブームでさらに加速し若者が殺到<br>・コリアンタウンとして有名だが、ネパール・タイ・ミャンマー等アジア各国の文化も共存<br>・地下には江戸時代の用水路「神田上水」の遺構が眠っている<br>・「大久保」の地名は江戸時代の旗本・大久保家の屋敷に由来する<br>・近年はフードコートや路面店が急増、週末は歩くのも困難なほど混雑する"},
  {n:"高田馬場",km:6.9,t:"09:15",tri:"・発車メロディが「鉄腕アトム」の唯一の駅！手塚治虫プロダクション最寄り駅だった縁から<br>・江戸時代は武士の馬術練習場（馬場）として整備された土地<br>・1702年「高田馬場の決闘」は赤穂浪士・堀部安兵衛が18人と戦った伝説の剣劇<br>・早稲田大学の最寄り駅のひとつで、学生の街として長年にわたり発展<br>・1日約70万人が利用する主要駅だが、山手線の駅の中では比較的コンパクト<br>・駅周辺には激安飲食店が密集、学生文化が生み出した独特の食文化が残る"},
  {n:"目白",km:8.1,t:"09:35",tri:"・かつて徳川将軍家の鷹狩り場として整備された武蔵野台地の高台<br>・学習院大学の最寄り駅で、皇族・旧財閥の邸宅が多く「山の手の山の手」と呼ばれた<br>・「目白」の地名は近くにあった「目白不動尊（青蓮寺）」に由来する<br>・椿山荘は明治の元勲・山縣有朋の別邸が起源の格式ある庭園・ホテル<br>・目白通りは江戸時代から続く幹線道路で歴史的な街道の名残をとどめる<br>・緑が多く静かな高級住宅街には多くの芸術家・文豪も居を構えた"},
  {n:"池袋",km:9.3,t:"10:00",tri:"・乗降客数は東京2位・世界3位クラスの超ターミナル。東京駅より乗降客が多い！<br>・西武百貨店 vs 東武百貨店の「百貨店戦争」は日本の流通史に名を刻む激戦<br>・「池袋」の地名は「池」があり「袋（ぬかるんだ低地）」状の地形だったことに由来<br>・サンシャインシティは1978年開業。かつての巣鴨プリズン（戦犯収容所）の跡地<br>・近年は中国文化の発信地「池袋チャイナタウン」として中国系住民・観光客が急増<br>・東京芸術劇場（バブル期代表の大型文化施設）が池袋西口のシンボル",m:"休憩15分 ★百貨店で補給",b:["rest","milestone"]},
  {n:"大塚",km:11.2,t:"10:45",tri:"・都電荒川線（愛称：さくらトラム）が山手線と交差する唯一のスポット<br>・都電荒川線は東京に唯一残る路面電車。1963年から60年以上現役で走り続ける<br>・「塚」は古墳を意味し、このあたりに古墳があったことが地名の由来<br>・かつての大塚駅周辺は戦前から歓楽街として栄えた下町の雰囲気が残る<br>・駅前商店街は昭和の雰囲気を色濃く残す、再開発の波に揉まれながらも健在<br>・JR山手線と都電が立体交差する光景は鉄道ファンの撮影スポットとしても人気"},
  {n:"巣鴨",km:12.4,t:"11:05",tri:"・「おばあちゃんの原宿」として全国区の有名商店街、年中賑わいが絶えない<br>・とげぬき地蔵（高岩寺）の洗い観音は体の悪い部分を洗うと治ると信じられ行列必至<br>・江戸時代は奥州街道の宿場町「巣鴨宿」として栄えた交通の要衝<br>・巣鴨地蔵通り商店街の全長は約780mで年間数百万人が訪れる<br>・真性寺には江戸六地蔵のひとつが安置され、江戸時代から信仰を集める<br>・塩大福・赤パンツが定番土産として全国的に有名。名物の赤パンツは縁起物"},
  {n:"駒込",km:13.5,t:"11:25",tri:"・山手線内に唯一残る有人踏切「第二中里踏切」が徒歩圏に現存する<br>・江戸時代から「駒込土筆（つくし）」が名産品として江戸中に知られていた<br>・六義園は元禄時代に柳沢吉保が造営した大名庭園で国の特別名勝に指定<br>・ソメイヨシノ発祥の地！染井霊園の植木職人がソメイヨシノを作り出したとされる<br>・「駒込」の地名は「コマゴメ（馬・駒がいた場所）」が由来という説がある<br>・六義園の枝垂れ桜は春に大行列ができる東京屈指の名桜スポット",b:["milestone"]},
  {n:"田端",km:14.8,t:"11:50",tri:"・山手線の正式な終点はここ田端！田端〜東京間は実は「東北本線」を走っている<br>・芥川龍之介・室生犀星・萩原朔太郎ら大正文壇の文豪が集まった「田端文士村」<br>・1896年開業の歴史ある駅で、当時は「北の玄関口」として機能した<br>・駅周辺にはJR東日本の工場・車両基地が広がり鉄道の一大拠点となっている<br>・田端高台は武蔵野台地の端に位置し、かつては江戸の眺望の名所だった<br>・駅近くの田端八幡神社は800年以上の歴史を誇る古社",m:"北端・折り返しポイント"},
  {n:"西日暮里",km:15.5,t:"13:00",tri:"・1971年開業、山手線では最も新しい駅のひとつ（開業当時29番目の駅）<br>・地下鉄千代田線との乗換駅として後から設置された計画駅<br>・道灌山は江戸時代の景勝地で、月見の名所として文人墨客に愛された<br>・太田道灌（江戸城を築いた武将）が山城を構えたと伝わる歴史ある地<br>・帝京科学大学など複数の教育機関が近くに立地する学生の多いエリア<br>・ここから南側は上野・東京方面へ。折り返し後の後半戦スタートの起点！",m:"再出発！午後の冒険へ",b:["milestone"]},
  {n:"日暮里",km:16.1,t:"13:15",tri:"・「日暮里」は「新堀（にいほり）」が転じた地名で「日が暮れるまで遊べる」という意味ではない<br>・繊維・布地の問屋街として有名、今もプロのデザイナーが生地を求めて全国から訪れる<br>・夕やけだんだん（石段）からの夕景は谷中の名物絶景スポット<br>・谷中銀座商店街は下町情緒あふれる昭和の雰囲気が残る商店街<br>・成田エクスプレスや常磐線も停車する北東京の主要ターミナル<br>・江戸時代から農村と都市の境界にあたり、独特の下町文化が育まれた"},
  {n:"鶯谷",km:17.0,t:"13:30",tri:"・山手線で1日の乗降客数が最も少ない駅（約1.6万人）。新宿の約80分の1という閑静ぶり<br>・「鶯谷」の地名は江戸時代に鶯が多く生息した谷間（上野の森の端）に由来<br>・松尾芭蕉も愛した風雅な地で、上野の杜と寛永寺の緑に囲まれた静寂な空間<br>・寛永寺は徳川将軍家の菩提寺で江戸幕府が厚く保護した格式最高の寺院<br>・ホームの脇を新幹線が高速で通過するという珍しい構造を持つ<br>・東京国立博物館まで徒歩15分、文化の香り漂うミュージアムエリアの玄関口"},
  {n:"上野",km:17.9,t:"13:50",tri:"・1883年開業の「北の玄関口」。東北・北陸への夜行列車・寝台特急が数多く発着した<br>・上野公園は1873年開設、日本初の公園のひとつ（太政官布達により整備）<br>・園内に東京国立博物館（日本最大）・国立科学博物館・上野動物園が密集する文化の殿堂<br>・日本で初めてパンダを迎えた動物園。1972年に蘭蘭・康康が来日し日本中が熱狂<br>・上野の山は戊辰戦争（1868年）の激戦地。彰義隊が立てこもり新政府軍と戦った<br>・不忍池の蓮は夏の風物詩。池の真下を地下鉄銀座線が走っている",m:"休憩10分 ★上野公園",b:["rest","milestone"]},
  {n:"御徒町",km:18.7,t:"14:20",tri:"・アメヤ横丁（アメ横）は終戦直後の闇市が起源。約400店舗が約500mに密集<br>・「アメ横」の「アメ」は「アメリカ（進駐軍払い下げ物資）」説と「飴（菓子類）」売りの店が多かった説が並立<br>・年末の海産物・食料品の買い出し風景はテレビ中継される全国区の風物詩<br>・江戸時代は中級武士「御徒衆（おかちしゅう）」の屋敷地だったことが地名の由来<br>・宝石・ジュエリーの問屋街としても知られ、国内有数のジュエリー集積地<br>・2Fや地下に密集するアジア系食材店には珍しい食材が所狭しと並ぶ"},
  {n:"秋葉原",km:19.7,t:"14:40",tri:"・戦後の電気部品の闇市→電気街として発展し、今や世界的なオタク文化の聖地<br>・駅名の由来は1869年の大火後に建てられた火除け地の「秋葉神社（あきばじんじゃ）」から<br>・ゲーム・アニメ・マンガの聖地として年間数百万人の外国人観光客が訪れる<br>・かつての神田青果市場の跡地に電気街が誕生し、今の秋葉原が形成された<br>・つくばエクスプレス（TX）の始発駅でもあり、茨城方面へのアクセス拠点<br>・かつては「電気街口」として有名だったが、近年はサブカル・フードも急増中"},
  {n:"神田",km:21.0,t:"15:00",tri:"・神保町の古書店街は世界最大規模を誇り、約180店の古書店が軒を連ねる<br>・神田祭は江戸三大祭のひとつ。徳川家康が江戸城鎮護を命じた由緒ある祭り<br>・江戸時代は神田川が江戸城の外堀として機能し、城の防衛ラインを担っていた<br>・「神田」の地名は「神様の田んぼ（神社に奉納する稲作地）」に由来する<br>・スポーツ用品・楽器・古書など「専門街」が集積する街として全国的に有名<br>・オフィス街の顔とは裏腹に、夜は昭和の飲み屋横丁が賑わいを見せる"},
  {n:"東京",km:22.3,t:"15:25",tri:"・1914年開業の赤レンガ駅舎は建築家・辰野金吾の設計で国の重要文化財に指定<br>・開業当初は「中央停車場」という仮称が使われていた<br>・地下街の総面積は約6.5万㎡に及び、まるでもうひとつの都市のよう<br>・2012年に丸の内駅舎が開業時の姿に完全復元（空襲で失われた3階部分も再現）<br>・東海道新幹線の起点駅であり、日本の鉄道網の最重要ハブとして機能<br>・皇居外苑まで徒歩10分、日本の政治・経済・歴史の中心に位置する象徴的な駅",m:"休憩15分 ★赤レンガ駅舎",b:["rest","milestone"]},
  {n:"有楽町",km:23.4,t:"16:05",tri:"・「有楽町で逢いましょう」（1957年・フランク永井）の歌謡曲で全国的に有名になった<br>・地名は戦国武将・織田信長の弟「織田長益（有楽斎）」の屋敷があったことに由来<br>・宝塚劇場・TOHOシネマズが並ぶ、近代的な演劇・映画文化の聖地<br>・有楽町マリオン（1984年開業）はかつての日劇（日本劇場）跡地に建てられた<br>・高架下の居酒屋横丁は戦後の闇市の雰囲気を今に伝える歴史的な飲食街<br>・銀座まで徒歩5分、東京の高級地区と庶民的エリアが隣り合う独自の場所"},
  {n:"新橋",km:24.6,t:"16:20",tri:"・1872年、日本初の鉄道（新橋〜横浜間）が開通した「鉄道発祥の地」<br>・SL広場のD51機関車は実際に走っていた本物のSL（1945年製造、デゴイチの愛称）<br>・「サラリーマンの聖地」と呼ばれ、平日夜の居酒屋街は日本の企業文化そのもの<br>・テレビの街頭インタビューの定番スポットとして有名で年中カメラが回っている<br>・江戸時代は東海道の起点「江戸の玄関口」として旅人が行き交った宿場町<br>・ゆりかもめ（新交通システム）の発着点で、お台場・豊洲方面へのアクセス拠点"},
  {n:"浜松町",km:26.0,t:"16:40",tri:"・東京モノレール羽田空港線の起点駅。1964年の東京五輪開幕に合わせて開通<br>・ホーム上の「小便小僧」は1952年設置。毎月ボランティアが手作りの衣装を着替えさせる<br>・浜離宮恩賜庭園は徳川将軍家の鷹狩り場・別荘だった大名庭園（国の特別名勝・特別史跡）<br>・世界貿易センタービルは1970年竣工、竣工時は都内最高層ビルとして話題を集めた<br>・芝大神宮は1005年創建の古社。江戸時代に15日間続く「だらだら祭り」で庶民に親しまれた<br>・かつては東京湾に面した漁村があり、将軍の別荘地として整備された海辺の土地"},
  {n:"田町",km:27.4,t:"17:00",tri:"・慶應義塾大学三田キャンパスの最寄り駅。明治以来の知の拠点が近くにある<br>・1868年（明治元年）、勝海舟と西郷隆盛が薩摩藩邸で会談し江戸城の無血開城が決まった<br>・この会談により100万都市・江戸が戦火を免れたという、日本史上最大の平和的決断の地<br>・「田町」の地名は江戸時代の農地（田んぼ）に由来するシンプルな地名<br>・現在は再開発が急進し、大企業オフィスビルと商業施設が次々と竣工中<br>・芝浦工業大学など理工系の大学も多く、エンジニア・技術者が多く集まる街",b:["milestone"]},
  {n:"高輪GW",km:28.3,t:"17:20",tri:"・2020年3月開業、山手線では49年ぶりの新駅（30番目の駅）<br>・駅名公募で「高輪」が1位、「芝浦」2位だったが結局「高輪ゲートウェイ」に決まり大論争<br>・設計は建築家・隈研吾。木材と鉄を組み合わせた和の雰囲気が特徴の近未来駅舎<br>・工事中に1872年当時の日本初の鉄道「高輪築堤」の遺構が発掘され歴史的な大発見に<br>・2050年代完成予定の超大規模再開発「TAKANAWA GATEWAY CITY」の中核となる予定<br>・現在の乗降客数は山手線最少クラスだが、周辺開発完成後は一変すると予測される"},
  {n:"品川",km:29.2,t:"17:40",tri:"・品川駅は「品川区」ではなく「港区」に位置するという有名なトリビア<br>・1872年、日本初の鉄道駅のひとつとして開業した超歴史的な駅（150年超の歴史）<br>・リニア中央新幹線の始発駅として大規模な地下駅が整備中（開業は2027年以降の見込み）<br>・品川宿は東海道五十三次の「江戸からの最初の宿場」として旅人に親しまれた<br>・港南口側は1990年代以降の再開発で大企業本社が密集する最先端ビジネスエリアに変貌<br>・新幹線停車・空港アクセス良好で、国内外からの訪問者が最初に降り立つ東京の玄関",m:"休憩10分 ★足の状態確認！",b:["rest","milestone"]},

/* ── localStorage ── */
const STORAGE_KEY = 'yamanote_stamped_v1';
const stamped = new Set();
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) JSON.parse(saved).forEach(i => stamped.add(Number(i)));
} catch(e) {}
function saveStamps() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...stamped])); } catch(e) {}
}

/* ── TAB SWITCH ── */
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('#bottom-nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'instant' });
  if (name === 'map') buildMapTab();
}

/* ── MAP TAB ── */
function mapsUrl(stationName) {
  return 'https://www.google.com/maps/dir/?api=1&destination=' + encodeURIComponent(stationName + '駅 東京') + '&travelmode=walking';
}

function buildMapTab() {
  const container = document.getElementById('map-content');
  container.innerHTML = '';

  let nextIdx = -1;
  for (let i = 0; i < ST.length; i++) {
    if (!stamped.has(i)) { nextIdx = i; break; }
  }

  if (nextIdx === -1) {
    container.innerHTML = '<div class="map-complete">🎉 全駅制覇！<br>山手線一周達成！</div>';
    return;
  }

  const next = ST[nextIdx];
  const dest = document.createElement('div');
  dest.className = 'map-dest-card';
  dest.innerHTML = `
    <div class="map-dest-label">— 次の目的地 —</div>
    <div class="map-dest-name">${next.n}駅</div>
    <div class="map-dest-meta">No.${nextIdx + 1} ／ ${next.km}km地点 ／ 目安 ${next.t}</div>
    <a href="${mapsUrl(next.n)}" target="_blank" rel="noopener" class="map-main-btn">📍 Googleマップで徒歩ルートを見る</a>
  `;
  container.appendChild(dest);

  const remaining = ST.filter((_, i) => !stamped.has(i));
  if (remaining.length <= 1) return;

  const title = document.createElement('div');
  title.className = 'map-section-title';
  title.textContent = '残りの駅 ' + (remaining.length - 1) + '駅';
  container.appendChild(title);

  ST.forEach((s, i) => {
    if (stamped.has(i) || i === nextIdx) return;
    const row = document.createElement('div');
    row.className = 'map-station-row';
    row.innerHTML = `
      <span class="map-st-num">No.${i + 1}</span>
      <span class="map-st-name">${s.n}駅</span>
      <span class="map-st-km">${s.km}km</span>
      <a href="${mapsUrl(s.n)}" target="_blank" rel="noopener" class="map-mini-btn">📍</a>
    `;
    container.appendChild(row);
  });
}

/* ── STAMP TAP ── */
function tap(i) {
  const wasOn = stamped.has(i);
  wasOn ? stamped.delete(i) : stamped.add(i);
  saveStamps();

  const card = document.getElementById('st' + i);
  const btn  = card.querySelector('.stamp-btn');
  const on   = stamped.has(i);

  btn.className = 'stamp-btn ' + (on ? 's' : 'u');
  btn.innerHTML = on ? '✔' : '到着<br>スタンプ';

  if (on) {
    card.classList.add('visited');
    toast('⚔ ' + ST[i].n + '駅 征服！');
    setTimeout(() => {
      card.classList.add('collapsed');
      applyFilter();
      setTimeout(scrollToNext, 350);
    }, 700);
  } else {
    card.classList.remove('visited', 'collapsed');
    applyFilter();
  }

  updateProg();
  updateMS();
}

/* ── SCROLL TO NEXT UNVISITED ── */
function scrollToNext() {
  for (let i = 0; i < ST.length; i++) {
    if (!stamped.has(i)) {
      const el = document.getElementById('st' + i);
      if (el && !el.classList.contains('hidden')) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.boxShadow = '0 0 18px rgba(200,146,10,.9)';
        setTimeout(() => { el.style.boxShadow = ''; }, 2100);
        return;
      }
    }
  }
  toast('🎉 全駅制覇！おめでとう！');
}

/* ── FILTER ── */
function toggleFilter() {
  filterOn = !filterOn;
  document.getElementById('filter-btn').classList.toggle('on', filterOn);
  applyFilter();
}
function applyFilter() {
  ST.forEach((_, i) => {
    const el = document.getElementById('st' + i);
    if (!el) return;
    el.classList.toggle('hidden', filterOn && stamped.has(i));
  });
}

/* ── PROGRESS ── */
function updateProg() {
  const c = stamped.size, pct = Math.round(c / ST.length * 100);
  const km = c > 0 ? Math.max(...[...stamped].map(i => ST[i].km)) : 0;
  document.getElementById('prog-bar').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-s').textContent = c;
  document.getElementById('prog-km').textContent = km.toFixed(1);
}

let mtt;
function showMilestoneToasts(milestones) {
  const container = document.getElementById('ms-toast-container');
  container.innerHTML = '';
  milestones.forEach(m => {
    const el = document.createElement('div');
    el.className = 'ms-toast';
    el.textContent = '🏆 ' + m.icon + ' ' + m.label.split('\n')[1] + ' 達成！';
    container.appendChild(el);
  });
  clearTimeout(mtt);
  mtt = setTimeout(() => { container.innerHTML = ''; }, 2500);
}

let restoring = false;
function updateMS() {
  const km = stamped.size > 0 ? Math.max(...[...stamped].map(i => ST[i].km)) : 0;
  const newlyUnlocked = [];
  MS.forEach(m => {
    const el = document.getElementById('ms' + m.km); if (!el) return;
    const was = el.classList.contains('unlocked');
    const now = km >= m.km;
    if (!was && now) newlyUnlocked.push(m);
    el.className = 'ms ' + (now ? 'unlocked' : 'locked');
    el.querySelector('.ms-icon').textContent = now ? m.icon : '🔒';
    const lbl = el.querySelector('.ms-label');
    if (lbl) { lbl.innerHTML = now ? m.label.replace('\n','<br>') : ''; }
  });
  if (newlyUnlocked.length > 0 && !restoring) {
    setTimeout(() => { showMilestoneToasts(newlyUnlocked); launchConfetti(); }, 400);
  }
}

/* ── CONFETTI ── */
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ['#e8b400','#b22222','#2d5a1b','#1a4a7a','#f5e6c8','#ffffff','#ff6b6b'];
  const pieces = Array.from({length: 150}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 150,
    r: 3 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 5,
    vy: 3 + Math.random() * 4,
    rot: Math.random() * 360,
    rotV: (Math.random() - 0.5) * 7,
    shape: Math.random() > 0.5 ? 'rect' : 'circle',
  }));
  let frame = 0;
  (function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      if (p.shape === 'rect') ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      else { ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI * 2); ctx.fill(); }
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.rotV; p.vy += 0.09;
    });
    if (++frame < 140) requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  })();
}

}

    const btn = card.querySelector('.stamp-btn');
    btn.className = 'stamp-btn s';
    btn.innerHTML = '✔';
  });
  updateProg();
  updateMS();
  restoring = false;
  if (stamped.size > 0 && stamped.size < ST.length) {
    showTab('stations');
    setTimeout(scrollToNext, 500);
  }
}
restoreUI();

/* ── RESET ── */
function resetAll() {
  if (!confirm('スタンプをすべてリセットしますか？')) return;
  stamped.clear(); saveStamps();
  ST.forEach((_, i) => {
    const card = document.getElementById('st' + i);
    if (!card) return;
    card.className = 'st-card';
    const btn = card.querySelector('.stamp-btn');
    btn.className = 'stamp-btn u';
    btn.innerHTML = '到着<br>スタンプ';
  });
  filterOn = false;
  document.getElementById('filter-btn').classList.remove('on');
  applyFilter();
  updateProg(); updateMS();
  toast('🔄 リセットしました');
  showTab('home');
}
</script>
</body>
</html>

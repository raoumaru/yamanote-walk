<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>山手線 冒険の旅しおり</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
  :root {
    --parchment: #f5e6c8; --parchment2: #ede0b0; --ink: #2a1a00;
    --red: #b22222; --gold: #c8920a; --gold2: #e8b400;
    --green: #2d5a1b; --brown: #6b3a1f; --stamp-green: #2e7d32;
    --map-blue: #1a4a7a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #1a1008; font-family: 'Noto Sans JP', sans-serif; color: var(--ink); padding: 12px 12px 72px; }

  .card { background: var(--parchment); border: 3px solid var(--gold); border-radius: 4px; padding: 14px; margin-bottom: 14px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }

  /* COVER */
  #cover {
    background: var(--parchment);
    background-image: repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(139,90,43,.08) 28px,rgba(139,90,43,.08) 29px);
    border: 6px double var(--gold); border-radius: 4px; padding: 24px 16px;
    margin-bottom: 14px; text-align: center; position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,.8), inset 0 0 60px rgba(139,90,43,.15);
  }
  .corner { position: absolute; font-size: 22px; color: var(--gold); opacity: .6; }
  .corner.tl{top:10px;left:10px} .corner.tr{top:10px;right:10px}
  .corner.bl{bottom:10px;left:10px} .corner.br{bottom:10px;right:10px}
  .cover-label { font-size: 11px; letter-spacing: 5px; color: var(--brown); margin-bottom: 4px; }
  .cover-main { font-size: clamp(26px,6vw,40px); font-weight: 900; color: var(--red); text-shadow: 2px 2px 0 var(--gold); line-height: 1.2; }
  .cover-sub { font-size: 11px; color: var(--brown); letter-spacing: 3px; margin: 6px 0 14px; }
  .divider { display:flex; align-items:center; gap:8px; margin: 8px 0; }
  .divider::before,.divider::after { content:''; flex:1; border-top: 1.5px solid var(--gold); }
  .divider span { color: var(--gold); font-size: 16px; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin: 12px 0; }
  .stat { background: rgba(139,90,43,.1); border: 1px solid var(--gold); border-radius: 3px; padding: 8px 4px; text-align: center; }
  .stat-n { font-size: 24px; font-weight: 900; color: var(--red); line-height: 1; }
  .stat-u { font-size: 10px; color: var(--brown); }
  .stat-l { font-size: 9px; color: var(--brown); margin-top: 2px; }
  .cover-quote { font-size: 11px; color: var(--brown); letter-spacing: 2px; font-style: italic; opacity: .8; }

  /* SECTION TITLE */
  .sec-title { font-size: 12px; font-weight: 700; color: var(--red); letter-spacing: 3px; text-align: center; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--gold); }

  /* PROGRESS */
  .prog-wrap { background: rgba(139,90,43,.15); border: 1px solid var(--gold); border-radius: 20px; height: 20px; overflow: hidden; margin-bottom: 6px; }
  #prog-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--gold2)); border-radius: 20px; transition: width .6s ease; width: 0%; display:flex; align-items:center; justify-content:flex-end; padding-right:6px; }
  #prog-bar span { font-size: 9px; color: white; font-weight: 700; }
  .prog-info { display:flex; justify-content:space-between; font-size: 10px; color: var(--brown); }

  /* MILESTONES */
  .ms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 6px; }
  .ms { border: 1.5px solid; border-radius: 4px; padding: 6px; text-align: center; transition: all .3s; }
  .ms.locked { border-color: rgba(139,90,43,.3); background: rgba(139,90,43,.05); opacity: .6; }
  .ms.unlocked { border-color: var(--gold); background: linear-gradient(135deg,rgba(200,146,10,.1),rgba(200,146,10,.2)); box-shadow: 0 0 10px rgba(200,146,10,.4); }
  .ms-icon { font-size: 20px; margin-bottom: 2px; }
  .ms-km { font-size: 15px; font-weight: 900; color: var(--red); }
  .ms.unlocked .ms-km { color: var(--gold); }
  .ms-label { font-size: 8px; color: var(--brown); line-height: 1.3; margin-top: 2px; }

  /* HALF LABEL */
  .half { background: var(--map-blue); color: white; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-align: center; padding: 4px; border-radius: 2px; margin-bottom: 8px; }
  .half.south { background: var(--green); }

  /* STATION CARD */
  .st-card { display:flex; align-items:flex-start; gap: 8px; padding: 8px; margin-bottom: 7px; border: 1px solid rgba(139,90,43,.25); border-radius: 4px; background: rgba(255,255,255,.4); transition: all .3s; }
  .st-card.visited { background: rgba(200,146,10,.12); border-color: var(--gold); }
  .stamp-btn { flex-shrink:0; width:46px; height:46px; border-radius:50%; border:3px solid; background:transparent; cursor:pointer; font-size:10px; font-weight:700; font-family:'Noto Sans JP',sans-serif; transition:all .25s; display:flex; align-items:center; justify-content:center; text-align:center; line-height:1.2; position:relative; }
  .stamp-btn.u { border-color: rgba(139,90,43,.3); color: rgba(139,90,43,.4); }
  .stamp-btn.s { border-color: var(--stamp-green); color: var(--stamp-green); background: rgba(46,125,50,.1); transform:rotate(-5deg); box-shadow:0 0 8px rgba(46,125,50,.3); font-size:18px; }
  .stamp-btn.s::after { content:''; position:absolute; inset:-2px; border:1px dashed var(--stamp-green); border-radius:50%; opacity:.5; }
  .stamp-btn:hover { transform: scale(1.05) rotate(-3deg); }
  .stamp-btn.s:hover { transform: scale(1.08) rotate(-5deg); }
  @keyframes stampIn { 0%{transform:scale(2) rotate(-15deg);opacity:0} 60%{transform:scale(.9) rotate(-3deg)} 100%{transform:scale(1) rotate(-5deg);opacity:1} }
  .stamp-btn.s { animation: stampIn .35s ease forwards; }

  .st-info { flex:1; min-width:0; }
  .st-head { display:flex; align-items:baseline; gap:6px; flex-wrap:wrap; margin-bottom:2px; }
  .st-num { font-size:9px; font-weight:700; color:var(--map-blue); background:rgba(26,74,122,.1); border:1px solid var(--map-blue); border-radius:2px; padding:1px 3px; flex-shrink:0; }
  .st-name { font-size:14px; font-weight:900; color:var(--ink); }
  .st-km { font-size:10px; color:var(--brown); margin-left:auto; white-space:nowrap; }
  .st-time { font-size:10px; color:var(--map-blue); font-weight:700; }
  .trivia { font-size:9.5px; color:var(--brown); background:rgba(139,90,43,.07); border-left:2px solid var(--gold); padding:3px 5px; margin-top:3px; border-radius:0 2px 2px 0; line-height:1.5; }
  .trivia-lbl { font-size:8px; font-weight:700; color:var(--gold); display:block; margin-bottom:1px; }
  .st-memo { font-size:9px; color:var(--green); font-weight:700; margin-top:2px; }
  .badge { display:inline-block; font-size:8px; font-weight:700; padding:1px 4px; border-radius:2px; margin-left:3px; vertical-align:middle; }
  .badge.start,.badge.goal { background:var(--red); color:white; }
  .badge.rest { background:var(--gold); color:white; }
  .badge.milestone { background:var(--map-blue); color:white; }
  .hr-dashed { border:none; border-top:1px dashed rgba(139,90,43,.3); margin:10px 0; }

  /* LUNCH */
  #lunch-card { border-color: var(--green); }
  .lunch-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  @media(max-width:400px){.lunch-grid{grid-template-columns:1fr}}
  .l-card { border:1px solid rgba(45,90,27,.3); border-radius:4px; padding:8px; background:rgba(255,255,255,.5); }
  .l-name { font-size:12px; font-weight:700; color:var(--ink); }
  .l-genre { font-size:9px; color:white; background:var(--green); border-radius:2px; padding:1px 4px; display:inline-block; margin:2px 0; }
  .l-rec { font-size:10px; color:var(--brown); font-weight:700; margin-bottom:2px; }
  .l-desc { font-size:9px; color:var(--brown); line-height:1.5; }

  /* TIPS */
  .tips-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
  @media(max-width:400px){.tips-grid{grid-template-columns:1fr}}
  .tip { display:flex; gap:6px; align-items:flex-start; padding:7px; background:rgba(255,255,255,.4); border-radius:3px; border:1px solid rgba(139,90,43,.2); }
  .tip-i { font-size:18px; flex-shrink:0; }
  .tip-t { font-size:9.5px; color:var(--ink); line-height:1.5; }
  .tip-t strong { color:var(--red); }

  /* TOAST */
  #toast { position:fixed; bottom:16px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--ink); color:var(--gold2); font-size:12px; font-weight:700; padding:8px 18px; border-radius:4px; border:1px solid var(--gold); transition:transform .4s ease; z-index:999; white-space:nowrap; pointer-events:none; }
  #toast.show { transform:translateX(-50%) translateY(0); }

  footer { text-align:center; color:rgba(245,230,200,.4); font-size:10px; padding:10px 0 16px; letter-spacing:2px; }

  /* BOTTOM NAV */
  #bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(20,12,4,.97); border-top:1.5px solid var(--gold); display:flex; justify-content:space-around; align-items:center; padding:5px 0 6px; z-index:200; backdrop-filter:blur(6px); }
  #bottom-nav button { background:transparent; border:none; color:rgba(200,146,10,.75); font-family:'Noto Sans JP',sans-serif; font-size:9px; padding:4px 6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:2px; border-radius:4px; transition:all .2s; min-width:48px; }
  #bottom-nav button:active { background:rgba(200,146,10,.15); color:var(--gold2); }
  #bottom-nav .nav-i { font-size:17px; line-height:1; }
  #btn-next { background:var(--red) !important; color:white !important; border:1.5px solid var(--gold) !important; border-radius:6px !important; padding:6px 10px !important; font-size:10px !important; font-weight:700 !important; min-width:64px !important; }
</style>
</head>
<body>

<div id="cover">
  <div class="corner tl">✦</div><div class="corner tr">✦</div>
  <div class="corner bl">✦</div><div class="corner br">✦</div>
  <div class="cover-label">— 冒険の記録 —</div>
  <div class="cover-main">山手線<br>一周徒歩の旅</div>
  <div class="cover-sub">渋谷より出立・新宿方向へ</div>
  <div class="divider"><span>⬡</span></div>
  <div class="stats">
    <div class="stat"><div class="stat-n">34</div><div class="stat-u">km</div><div class="stat-l">総距離</div></div>
    <div class="stat"><div class="stat-n">30</div><div class="stat-u">駅</div><div class="stat-l">チェックポイント</div></div>
    <div class="stat"><div class="stat-n">12</div><div class="stat-u">時間</div><div class="stat-l">大冒険</div></div>
  </div>
  <div class="divider"><span>⬡</span></div>
  <div class="cover-quote">「一歩一歩が、伝説になる。」</div>
</div>

<div class="card" id="progress-card">
  <div class="sec-title">⚔ 冒険の進捗 ⚔</div>
  <div class="prog-wrap"><div id="prog-bar"><span id="prog-pct">0%</span></div></div>
  <div class="prog-info">
    <span>渋谷 出発</span>
    <span><span id="prog-s">0</span>/30駅 ｜ <span id="prog-km" style="color:var(--red);font-weight:700;">0</span>km</span>
    <span>渋谷 ゴール</span>
  </div>
</div>

<div class="card" id="ms-card">
  <div class="sec-title">🏆 距離マイルストーン</div>
  <div class="ms-grid" id="ms-grid"></div>
</div>

<div class="card" id="stations-card">
  <div class="sec-title">🗺 チェックポイント一覧</div>
  <p style="font-size:9px;color:var(--brown);text-align:center;margin-bottom:10px;">各駅のスタンプを押して冒険を記録しよう！</p>
  <div class="half">【前半】北半周　渋谷 → 田端</div>
  <div id="north"></div>
  <hr class="hr-dashed">
  <div class="half south">【後半】南半周　田端 → 渋谷</div>
  <div id="south"></div>
</div>

<div class="card" id="lunch-card">
  <div class="sec-title" style="color:var(--green);">🍜 昼餉の章　― 谷中銀座 ―</div>
  <p style="font-size:9px;color:var(--brown);text-align:center;margin-bottom:10px;">腹八分目を守り、後半の冒険に備えよ。蕎麦・うどんが上策なり。</p>
  <div class="lunch-grid" id="lunch-grid"></div>
</div>

<div class="card" id="tips-card">
  <div class="sec-title">⚡ 冒険者の心得</div>
  <div class="tips-grid" id="tips-grid"></div>
</div>

<footer>― 山手線一周徒歩の旅しおり ― 令和の大冒険 ―<br>
<button onclick="resetAll()" style="margin-top:10px;background:transparent;border:1px solid rgba(245,230,200,0.3);color:rgba(245,230,200,0.4);font-size:10px;padding:4px 14px;border-radius:3px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;">スタンプをリセット</button>
</footer>
<div id="toast"></div>

<nav id="bottom-nav">
  <button onclick="navTo('cover')"><span class="nav-i">📜</span>表紙</button>
  <button onclick="navTo('progress-card')"><span class="nav-i">📊</span>進捗</button>
  <button id="btn-next" onclick="jumpToNext()"><span class="nav-i">⚑</span>次の駅</button>
  <button onclick="navTo('stations-card')"><span class="nav-i">🗺</span>駅一覧</button>
  <button onclick="navTo('tips-card')"><span class="nav-i">⚡</span>心得</button>
</nav>

<script>
const ST = [
  {n:"渋谷",km:0,t:"07:00",tri:"ハチ公像のモデルは秋田犬。1925年から1934年まで毎日主人を待ち続けた。乗降客数は山手線3位。",m:"スタート！ハチ公口より出発",b:["start"]},
  {n:"原宿",km:2.0,t:"07:35",tri:"明治神宮は1920年創建。境内の森は約100年で人工林から自然林へと進化した奇跡の森。竹下通りは年間約1000万人が訪れる。",m:"明治神宮・竹下通りそば"},
  {n:"代々木",km:3.5,t:"08:05",tri:"代々木公園は1964年東京五輪の選手村跡地。面積54haは都内最大級。「代々木」という巨大な欅の木が名前の由来。",m:"代々木公園沿い"},
  {n:"新宿",km:4.5,t:"08:20",tri:"乗降客数1日約200万人でギネス認定・世界一！改札口は約200か所、出口は約60か所。迷子続出の魔境。",m:"休憩15分 ★補給推奨",b:["rest"]},
  {n:"新大久保",km:5.7,t:"08:55",tri:"多国籍エリアで50カ国以上の料理が食べられる。1999年ごろから韓国文化の発信地に変貌した。"},
  {n:"高田馬場",km:6.9,t:"09:15",tri:"発車メロディは「鉄腕アトム」！手塚治虫プロダクション最寄り駅だった縁から。江戸時代は馬術の練習場だった。"},
  {n:"目白",km:8.1,t:"09:35",tri:"かつて徳川将軍家の鷹狩り場。学習院大学最寄りで皇族・財閥の屋敷が多く「山の手の山の手」と呼ばれた。"},
  {n:"池袋",km:9.3,t:"10:00",tri:"乗降客数は世界2位（東京駅より多い）！「池」があり「袋」状の地形だったことが地名の由来。西武・東武が対峙する百貨店戦争の地。",m:"休憩15分 ★百貨店で補給",b:["rest","milestone"]},
  {n:"大塚",km:11.2,t:"10:45",tri:"都電荒川線（さくらトラム）が交差する。都電は東京に唯一残る路面電車。地名は古墳（塚）があったことに由来。"},
  {n:"巣鴨",km:12.4,t:"11:05",tri:"「おばあちゃんの原宿」として有名。とげぬき地蔵（高岩寺）の洗い観音は行列必至。江戸時代は宿場町だった。"},
  {n:"駒込",km:13.5,t:"11:25",tri:"山手線唯一の踏切「第二中里踏切」が近くにある！「駒込土筆」は江戸から有名な名産品。高級住宅街の代名詞。",b:["milestone"]},
  {n:"田端",km:14.8,t:"11:50",tri:"山手線の正式な終点はここ！田端から東京は実は「東北本線」。芥川龍之介・室生犀星ら文豪が多く住んだ文士村。",m:"北端・折り返しポイント"},
  {n:"西日暮里",km:15.5,t:"13:00",tri:"1971年開業、山手線29番目の駅（当時）。道灌山は江戸時代の景勝地。午後1時に再出発！",m:"再出発！午後の冒険へ",b:["milestone"]},
  {n:"日暮里",km:16.1,t:"13:15",tri:"「日暮里」は「新堀（にいほり）」が転じた地名。繊維問屋街として有名。夕やけだんだんからの夕日は絶景。"},
  {n:"鶯谷",km:17.0,t:"13:30",tri:"山手線で1日の乗降客数が最も少ない駅（約1.6万人）。新宿の約80分の1！松尾芭蕉も愛した風雅な土地。"},
  {n:"上野",km:17.9,t:"13:50",tri:"1883年開業の歴史ある北の玄関口。東北・北陸への寝台列車が発着した。上野公園は日本初の公園のひとつ（1873年）。",m:"休憩10分 ★上野公園",b:["rest","milestone"]},
  {n:"御徒町",km:18.7,t:"14:20",tri:"アメ横（アメヤ横丁）は終戦後の闇市が起源。約400店が軒を連ねる約500mの商店街。年末のにぎわいは風物詩。"},
  {n:"秋葉原",km:19.7,t:"14:40",tri:"戦後は電気街として発展し今や世界的なアニメ・マンガ聖地に。語源は1869年の大火後に建てられた「秋葉神社」から。"},
  {n:"神田",km:21.0,t:"15:00",tri:"世界最大の古書店街「神田神保町」の最寄り。約180店が集まる。江戸時代は江戸城の外堀の役割を果たした神田川が流れる。"},
  {n:"東京",km:22.3,t:"15:25",tri:"1914年開業の赤レンガ駅舎は重要文化財。設計者は辰野金吾。地下には巨大な地下街が広がり、まるで地下都市！",m:"休憩15分 ★赤レンガ駅舎",b:["rest","milestone"]},
  {n:"有楽町",km:23.4,t:"16:05",tri:"「有楽町で逢いましょう」の歌で有名。織田信長の弟・織田長益（有楽斎）の屋敷があったことが地名の由来。"},
  {n:"新橋",km:24.6,t:"16:20",tri:"日本初の鉄道（新橋〜横浜間）が1872年に開通した鉄道発祥の地！SL広場のD51機関車は1945年製。"},
  {n:"浜松町",km:26.0,t:"16:40",tri:"東京モノレールの起点駅。小便小僧は1952年設置で毎月衣装が変わる。世界貿易センタービルの最寄り。"},
  {n:"田町",km:27.4,t:"17:00",tri:"慶應義塾大学三田キャンパスの最寄り。幕末に勝海舟と西郷隆盛が会談した地が近く、江戸城無血開城の舞台裏。",b:["milestone"]},
  {n:"高輪GW",km:28.3,t:"17:20",tri:"2020年開業、山手線30番目の最新駅。駅名公募では「高輪」が1位だったが落選し大騒ぎに。設計は隈研吾。"},
  {n:"品川",km:29.2,t:"17:40",tri:"品川駅は品川区ではなく港区にある！日本最初の鉄道駅のひとつ（1872年）。リニア予定地として再開発が進む。",m:"休憩10分 ★足の状態確認！",b:["rest","milestone"]},
  {n:"大崎",km:31.1,t:"18:20",tri:"山手線の車両基地がある駅。つまり山手線の電車はここから毎朝出発する！再開発で「おしゃれタウン」に変貌。"},
  {n:"五反田",km:32.3,t:"18:40",tri:"「五反田」の地名は江戸時代に5反（約4,900㎡）の田んぼがあったことから。あと2駅、気力を振り絞れ！"},
  {n:"目黒",km:33.5,t:"19:00",tri:"目黒不動尊（瀧泉寺）は関東三大不動のひとつ。目黒川の桜並木は春の絶景。「目黒のさんま」の落語でも有名。"},
  {n:"恵比寿",km:34.0,t:"19:20",tri:"発車メロディは映画「第三の男」のテーマ。エビスビール工場があった縁から。ヱビスGPがかつての工場跡地。あと1駅！",b:["milestone"]},
  {n:"渋谷",km:34.5,t:"19:45",tri:"ゴール！山手線一周34.5km、大冒険を完遂！ハチ公に帰還の報告を忘れずに。あなたは伝説の冒険者だ！",m:"ゴール！伝説達成！！",b:["goal"]},
];

const MS = [
  {km:5,  icon:"🌟",label:"5km達成!\n富士5合目相当"},
  {km:10, icon:"⚔️",label:"10km突破!\n東京↔横浜の距離"},
  {km:15, icon:"🏔️",label:"15km制覇!\n北半周クリア"},
  {km:20, icon:"🌊",label:"20km到達!\nハーフマラソン"},
  {km:25, icon:"🔥",label:"25km突破!\n残り10km切り"},
  {km:30, icon:"👑",label:"30km制覇!\n品川越え"},
  {km:34.5,icon:"🎉",label:"34.5km完歩!\n山手線一周達成！"},
];

const LUNCH = [
  {n:"川むら",g:"蕎麦",a:"日暮里駅徒歩3分",r:"もり蕎麦・せいろ",d:"明治5年創業の老舗。あっさり出汁が疲れた体に染みる。消化よく後半の歩行に最適。"},
  {n:"長生庵",g:"蕎麦",a:"谷中銀座内",r:"ざる蕎麦・かけ蕎麦",d:"120年の歴史を誇る名店。BGMなしの静かな店内でゆっくり足を休めよ。"},
  {n:"めん処かみや",g:"蕎麦",a:"西日暮里駅徒歩1分",r:"天ざるそば 約950円",d:"コスパ最強ランチ。天ぷらは軽く胃もたれしない。財布にも足にも優しい。"},
  {n:"金澤亭",g:"創作うどん",a:"千駄木駅徒歩3分",r:"釜玉・ネバネバうどん",d:"量が調節しやすく食べすぎを防げる。仲間と違う品をシェアも良し。"},
  {n:"レストランザクロ",g:"中東料理",a:"谷中銀座内",r:"ランチセット",d:"トルコ・イラン料理の異色の一軒。米中心でエネルギー補給に優れる珍店。"},
];

const TIPS = [
  {i:"💧",t:"<strong>水分は渇く前に補給。</strong>各駅に自販機あり。500mlを2本以上携帯すること。"},
  {i:"🧂",t:"<strong>塩分補給タブレット必携。</strong>汗で失う塩分が熱中症の引き金になる。"},
  {i:"👟",t:"<strong>靴はクッション厚めのスニーカー。</strong>革靴・サンダルは34kmで足が終わる。"},
  {i:"🩹",t:"<strong>靴擦れ防止パッドを事前に貼る。</strong>擦れてからでは遅い。予防が全て。"},
  {i:"📱",t:"<strong>モバイルバッテリー必携。</strong>地図アプリで電池消耗が激しい。充電切れは迷子の元。"},
  {i:"🚃",t:"<strong>リタイアは恥じゃない。</strong>各駅から山手線に乗れる。ICカードを忘れずに。"},
  {i:"🍱",t:"<strong>昼食は腹八分目。</strong>食べすぎると後半の歩行が地獄になる。蕎麦・うどんが吉。"},
  {i:"👥",t:"<strong>品川（29km）を越えれば絶対完歩できる。</strong>仲間と声を掛け合え！"},
];

// localStorage でスタンプ状態を永続化
const STORAGE_KEY = 'yamanote_stamped_v1';
const stamped = new Set();
try {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) JSON.parse(saved).forEach(i => stamped.add(Number(i)));
} catch(e) {}

function saveStamps() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify([...stamped])); } catch(e) {}
}

// Milestones
const msGrid = document.getElementById('ms-grid');
MS.forEach(m => {
  const d = document.createElement('div');
  d.className = 'ms locked'; d.id = 'ms'+m.km;
  d.innerHTML = `<div class="ms-icon">🔒</div><div class="ms-km">${m.km}km</div><div class="ms-label">${m.label.replace('\n','<br>')}</div>`;
  msGrid.appendChild(d);
});

// Stations
const northEl = document.getElementById('north');
const southEl = document.getElementById('south');
ST.forEach((s,i) => {
  const badges = (s.b||[]).map(b => {
    const lbl = {start:'スタート',rest:'休憩',goal:'ゴール！',milestone:'里程標'};
    return `<span class="badge ${b}">${lbl[b]}</span>`;
  }).join('');
  const d = document.createElement('div');
  d.className = 'st-card'; d.id = 'st'+i;
  d.innerHTML = `
    <button class="stamp-btn u" onclick="tap(${i})">到着<br>スタンプ</button>
    <div class="st-info">
      <div class="st-head">
        <span class="st-num">No.${i+1}</span>
        <span class="st-name">${s.n}駅${badges}</span>
        <span class="st-km">${s.km}km</span>
      </div>
      <div class="st-time">⏱ ${s.t}</div>
      <div class="trivia"><span class="trivia-lbl">📖 トリビア</span>${s.tri}</div>
      ${s.m ? `<div class="st-memo">▶ ${s.m}</div>` : ''}
    </div>`;
  (i <= 11 ? northEl : southEl).appendChild(d);
});

// Lunch
const lg = document.getElementById('lunch-grid');
LUNCH.forEach(l => {
  const d = document.createElement('div'); d.className = 'l-card';
  d.innerHTML = `<div class="l-name">${l.n}</div><span class="l-genre">${l.g}</span><span style="font-size:9px;color:var(--brown);margin-left:3px">${l.a}</span><div class="l-rec">推薦：${l.r}</div><div class="l-desc">${l.d}</div>`;
  lg.appendChild(d);
});

// Tips
const tg = document.getElementById('tips-grid');
TIPS.forEach(t => {
  const d = document.createElement('div'); d.className = 'tip';
  d.innerHTML = `<div class="tip-i">${t.i}</div><div class="tip-t">${t.t}</div>`;
  tg.appendChild(d);
});

function tap(i) {
  stamped.has(i) ? stamped.delete(i) : stamped.add(i);
  saveStamps();
  const card = document.getElementById('st'+i);
  const btn = card.querySelector('.stamp-btn');
  const on = stamped.has(i);
  card.className = 'st-card' + (on ? ' visited' : '');
  btn.className = 'stamp-btn ' + (on ? 's' : 'u');
  btn.innerHTML = on ? '✔' : '到着<br>スタンプ';
  if (on) toast('⚔ ' + ST[i].n + '駅 征服！');
  updateProg(); updateMS();
}

function updateProg() {
  const c = stamped.size, pct = Math.round(c/ST.length*100);
  const km = c > 0 ? Math.max(...[...stamped].map(i=>ST[i].km)) : 0;
  document.getElementById('prog-bar').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-s').textContent = c;
  document.getElementById('prog-km').textContent = km.toFixed(1);
}

function updateMS() {
  const km = stamped.size > 0 ? Math.max(...[...stamped].map(i=>ST[i].km)) : 0;
  MS.forEach(m => {
    const el = document.getElementById('ms'+m.km); if(!el) return;
    const was = el.classList.contains('unlocked');
    const now = km >= m.km;
    if (!was && now) setTimeout(() => toast('🏆 '+m.icon+' '+m.label.split('\n')[1]+' 達成！'), 400);
    el.className = 'ms ' + (now ? 'unlocked' : 'locked');
    el.querySelector('.ms-icon').textContent = now ? m.icon : '🔒';
  });
}

let tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tt); tt = setTimeout(()=>el.classList.remove('show'), 2200);
}

// 読み込み時にスタンプ状態をUIに反映
function restoreUI() {
  stamped.forEach(i => {
    const card = document.getElementById('st'+i);
    if (!card) return;
    const btn = card.querySelector('.stamp-btn');
    card.className = 'st-card visited';
    btn.className = 'stamp-btn s';
    btn.innerHTML = '✔';
  });
  updateProg();
  updateMS();
  if (stamped.size > 0 && stamped.size < ST.length) {
    setTimeout(() => jumpToNext(), 500);
  }
}
restoreUI();

function navTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function jumpToNext() {
  for (let i = 0; i < ST.length; i++) {
    if (!stamped.has(i)) {
      const el = document.getElementById('st' + i);
      if (!el) continue;
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.style.transition = 'box-shadow .3s';
      el.style.boxShadow = '0 0 18px rgba(200,146,10,.9)';
      setTimeout(() => { el.style.boxShadow = ''; }, 1600);
      return;
    }
  }
  toast('🎉 全駅制覇！おめでとう！');
}

// リセットボタン処理
function resetAll() {
  if (!confirm('スタンプをすべてリセットしますか？')) return;
  stamped.clear();
  saveStamps();
  ST.forEach((_,i) => {
    const card = document.getElementById('st'+i);
    if (!card) return;
    const btn = card.querySelector('.stamp-btn');
    card.className = 'st-card';
    btn.className = 'stamp-btn u';
    btn.innerHTML = '到着<br>スタンプ';
  });
  updateProg(); updateMS();
  toast('🔄 リセットしました');
}
</script>
</body>
</html>
